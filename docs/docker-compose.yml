services:
  hyperdx:
    image: docker.hyperdx.io/hyperdx/hyperdx-all-in-one
    container_name: hyperdx
    restart: unless-stopped
    ports:
      - "8080:8080"   # HyperDX web UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8123:8123"   # ClickHouse HTTP (optional, for ad-hoc SQL)
      - "9000:9000"   # ClickHouse native (optional)
    volumes:
      - hyperdx-data:/data
      - hyperdx-ch:/var/lib/clickhouse
      - hyperdx-ch-logs:/var/log/clickhouse-server

volumes:
  hyperdx-data:
  hyperdx-ch:
  hyperdx-ch-logs: